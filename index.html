<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SoccerSim</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
    }

    .controls {
      position: fixed;
      top: 10px;
      right: 14px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    .field-btn {
      padding: 5px 12px;
      font-size: 11px;
      font-family: inherit;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.5);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .field-btn:hover {
      background: rgba(255,255,255,0.14);
      color: #fff;
    }
    .field-btn.active {
      background: rgba(58,140,42,0.6);
      color: #fff;
      border-color: rgba(58,140,42,0.8);
    }

    canvas {
      display: block;
      border-radius: 4px;
    }

    /* Hidden but accessible */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
    }
  </style>
</head>
<body>
  <div class="controls">
    <button id="btn5v5" class="field-btn">5v5</button>
    <button id="btn11v11" class="field-btn active">11v11</button>
  </div>

  <canvas id="gameCanvas"></canvas>

  <!-- Screen reader accessible, visually hidden -->
  <div class="sr-only">
    <span id="scoreDisplay">RED 0 - 0 BLUE</span>
    <span id="timeDisplay">0:00</span>
    <span id="fieldInfo"></span>
  </div>

  <script type="module" src="src/main.js?v=16"></script>
</body>
</html>
